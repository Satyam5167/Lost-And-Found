<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard | TraceItBack</title>
    <link rel="stylesheet" href="main.css" />
</head>
<body class="bg-slate-100 p-4">
    <div class="flex justify-between items-center mb-6">
        <img src="mainlogo.png" class="h-12 rounded-xl" alt="Logo" />
        <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600">Logout</button>
    </div>

    <h1 class="text-2xl font-bold mb-4">Your Reported Items</h1>
    <div id="itemsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Items will load here -->
    </div>

    <script>
        async function apiFetch(endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const res = await fetch(`http://localhost:3002${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers,
                    'Authorization': token ? `Bearer ${token}` : ''
                }
            });

            if (res.status === 401) {
                localStorage.removeItem('token');
                alert("Session expired. Please log in again.");
                window.location.href = '/index.html';
            }

            return res.json();
        }

        async function loadItems() {
            try {
                const items = await apiFetch('/items');
                const container = document.querySelector('#itemsContainer');
                container.innerHTML = '';

                if (!items || items.length === 0) {
                    container.innerHTML = '<p class="text-gray-500">No items found.</p>';
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-4 rounded-xl shadow-md';
                    card.innerHTML = `
                        <h3 class="text-lg font-bold">${item.title}</h3>
                        <p class="text-sm text-gray-600">${item.description}</p>
                        <p class="text-xs text-gray-400">${item.location} - ${item.status}</p>
                        <p class="text-xs">${new Date(item.date_reported).toLocaleDateString()}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                alert("Failed to load items.");
                console.error(error);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        });

        loadItems();
    </script>
</body>
</html>
